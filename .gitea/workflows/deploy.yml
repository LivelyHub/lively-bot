name: Build & Deploy lively-bot

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Type errors fail the image build (tsc runs inside `docker build`),
      # so this is the CI gate as well as the artifact.
      - name: Build image
        run: docker build -t lively-bot:${{ gitea.sha }} -t lively-bot:latest .

      # The whole runtime env lives in one Gitea secret (BOT_ENV_FILE) whose
      # value is a complete .env file: OPENAI_API_KEY, OPENROUTER_API_KEY,
      # BACKEND_API_URL, BOT_SERVICE_KEY, model overrides, etc.
      # PORT and DATABASE_PATH are baked into the image and need no entry.
      - name: Write runtime env file
        run: |
          umask 077
          printf '%s\n' "${{ secrets.BOT_ENV_FILE }}" | tr -d '\r' > .env.deploy

      - name: Replace container
        # Shared user-defined network so lively-backend can reach this
        # container as http://lively-bot:7002 (default bridge has no DNS).
        run: |
          docker network create lively 2>/dev/null || true
          docker rm -f lively-bot 2>/dev/null || true
          docker run -d \
            --name lively-bot \
            --restart unless-stopped \
            --network lively \
            -p 7002:7002 \
            --env-file .env.deploy \
            -v lively-bot-data:/app/data \
            lively-bot:${{ gitea.sha }}
          rm -f .env.deploy

      # The job may run inside the act_runner's own container, where localhost
      # is not the host — so probe through the Docker daemon with `docker exec`
      # instead of curling the published host port.
      - name: Verify container is serving
        run: |
          for i in $(seq 1 10); do
            status=$(docker inspect -f '{{.State.Status}}' lively-bot 2>/dev/null || echo missing)
            if [ "$status" != "running" ]; then
              echo "container status: $status"
              docker logs lively-bot 2>&1 | tail -50 || true
              exit 1
            fi
            if docker exec lively-bot node -e "fetch('http://localhost:7002/reply',{method:'POST',headers:{'content-type':'application/json'},body:'{}'}).then(r=>{console.log('HTTP '+r.status);process.exit([400,401].includes(r.status)?0:2)}).catch(()=>process.exit(3))"; then
              echo "service is up"
              exit 0
            fi
            sleep 2
          done
          echo "service did not come up in time"
          docker logs lively-bot 2>&1 | tail -50 || true
          exit 1

      - name: Prune old images
        if: success()
        run: docker image prune -f
